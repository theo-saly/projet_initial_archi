name: CI

on:
    pull_request:
        branches: [dev, main]

jobs:
    # Détecter quels services ont changé
    detect-changes:
        runs-on: ubuntu-latest
        outputs:
            auth: ${{ steps.filter.outputs.auth }}
            project: ${{ steps.filter.outputs.project }}
            task: ${{ steps.filter.outputs.task }}
            notification: ${{ steps.filter.outputs.notification }}
            frontend: ${{ steps.filter.outputs.frontend }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      auth:
                        - 'services/auth-service/**'
                      project:
                        - 'services/project-service/**'
                      task:
                        - 'services/task-service/**'
                      notification:
                        - 'services/notification-service/**'
                      frontend:
                        - 'frontend/**'

    # Build Docker multi-arch (seulement les services modifiés)
    build:
        needs: detect-changes
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - service: auth-service
                      changed: ${{ needs.detect-changes.outputs.auth }}
                    - service: project-service
                      changed: ${{ needs.detect-changes.outputs.project }}
                    - service: task-service
                      changed: ${{ needs.detect-changes.outputs.task }}
                    - service: notification-service
                      changed: ${{ needs.detect-changes.outputs.notification }}
        steps:
            - uses: actions/checkout@v4
              if: matrix.changed == 'true'

            - name: Setup QEMU
              if: matrix.changed == 'true'
              uses: docker/setup-qemu-action@v3

            - name: Setup Docker Buildx
              if: matrix.changed == 'true'
              uses: docker/setup-buildx-action@v3

            - name: Build image ${{ matrix.service }}
              if: matrix.changed == 'true'
              uses: docker/build-push-action@v6
              with:
                  context: ./services/${{ matrix.service }}
                  platforms: linux/amd64,linux/arm64
                  push: false
                  tags: ${{ matrix.service }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
