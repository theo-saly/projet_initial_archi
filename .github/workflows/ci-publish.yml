name: Publish

on:
    push:
        branches: [main]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                service:
                    [
                        auth-service,
                        project-service,
                        task-service,
                        notification-service,
                    ]
        steps:
            - uses: actions/checkout@v4

            - name: Setup QEMU
              uses: docker/setup-qemu-action@v3

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract version from package.json
              id: version
              run: |
                  VERSION=$(node -p "require('./services/${{ matrix.service }}/package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "major=$(echo "$VERSION" | cut -d. -f1)" >> "$GITHUB_OUTPUT"
                  echo "minor=$(echo "$VERSION" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"

            - name: Build et push ${{ matrix.service }}
              uses: docker/build-push-action@v6
              with:
                  context: ./services/${{ matrix.service }}
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/projet_initial_archi/${{ matrix.service }}:latest
                      ghcr.io/${{ github.repository_owner }}/projet_initial_archi/${{ matrix.service }}:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/projet_initial_archi/${{ matrix.service }}:${{ steps.version.outputs.major }}
                      ghcr.io/${{ github.repository_owner }}/projet_initial_archi/${{ matrix.service }}:${{ steps.version.outputs.minor }}
                      ghcr.io/${{ github.repository_owner }}/projet_initial_archi/${{ matrix.service }}:${{ steps.version.outputs.version }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
