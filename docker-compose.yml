services:
    auth-service:
        build: ./services/auth-service
        ports:
            - '3001:3001'
        volumes:
            - ./services/auth-service/src:/app/src
            - auth-data:/app/data
        environment:
            - JWT_SECRET=${JWT_SECRET}
            - SQLITE_DB_LOCATION=/app/data/auth.db

    project-service:
        build: ./services/project-service
        ports:
            - '3002:3002'
        volumes:
            - ./services/project-service/src:/app/src
            - project-data:/app/data
        environment:
            - JWT_SECRET=${JWT_SECRET}
            - DB_TYPE=${DB_TYPE:-sqlite}
            - SQLITE_DB_LOCATION=/app/data/projects.db
            - TASK_SERVICE_URL=http://task-service:3003
            - REDIS_HOST=redis
            - MYSQL_HOST=mysql-projects
            - MYSQL_USER=${MYSQL_USER}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD}
            - MYSQL_DB=projects
        depends_on:
            - redis

    task-service:
        build: ./services/task-service
        ports:
            - '3003:3003'
        volumes:
            - ./services/task-service/src:/app/src
            - task-data:/app/data
        environment:
            - JWT_SECRET=${JWT_SECRET}
            - DB_TYPE=${DB_TYPE:-sqlite}
            - SQLITE_DB_LOCATION=/app/data/tasks.db
            - REDIS_HOST=redis
            - MYSQL_HOST=mysql-tasks
            - MYSQL_USER=${MYSQL_USER}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD}
            - MYSQL_DB=tasks
        depends_on:
            - redis

    notification-service:
        build: ./services/notification-service
        ports:
            - '3004:3004'
        volumes:
            - ./services/notification-service/src:/app/src
            - notification-logs:/app/logs
        environment:
            - REDIS_HOST=redis
            - LOG_FILE=/app/logs/notifications.log
            - SMTP_HOST=${SMTP_HOST}
            - SMTP_PORT=${SMTP_PORT}
            - SMTP_SECURE=${SMTP_SECURE}
            - SMTP_USER=${SMTP_USER}
            - SMTP_PASS=${SMTP_PASS}
            - SMTP_FROM=${SMTP_FROM}
            - SMTP_RECIPIENT=${SMTP_RECIPIENT}
            - AUTH_SERVICE_URL=http://auth-service:3001
            - PROJECT_SERVICE_URL=http://project-service:3002
        depends_on:
            - redis

    mysql-tasks:
        image: mysql:8
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: tasks
        ports:
            - '3308:3306'
        volumes:
            - mysql-tasks-data:/var/lib/mysql
        profiles:
            - mysql

    mysql-projects:
        image: mysql:8
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: projects
        ports:
            - '3309:3306'
        volumes:
            - mysql-projects-data:/var/lib/mysql
        profiles:
            - mysql

    redis:
        image: redis:7-alpine
        ports:
            - '6379:6379'

    frontend:
        image: nginx:alpine
        ports:
            - '3000:80'
        volumes:
            - ./frontend:/usr/share/nginx/html:ro
            - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - auth-service
            - project-service
            - task-service

volumes:
    auth-data:
    project-data:
    task-data:
    notification-logs:
    mysql-tasks-data:
    mysql-projects-data:
