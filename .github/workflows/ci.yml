name: CI

on:
    pull_request:
        branches: [dev, main]

jobs:
    # ─── Détecter quels services ont changé ───
    detect-changes:
        runs-on: ubuntu-latest
        outputs:
            auth: ${{ steps.filter.outputs.auth }}
            project: ${{ steps.filter.outputs.project }}
            task: ${{ steps.filter.outputs.task }}
            notification: ${{ steps.filter.outputs.notification }}
            frontend: ${{ steps.filter.outputs.frontend }}
            ci: ${{ steps.filter.outputs.ci }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      auth:
                        - 'services/auth-service/**'
                      project:
                        - 'services/project-service/**'
                      task:
                        - 'services/task-service/**'
                      notification:
                        - 'services/notification-service/**'
                      frontend:
                        - 'frontend/**'
                      ci:
                        - '.github/workflows/**'
                        - '.github/dependabot.yml'

    # ─── Tests unitaires (par service) ───
    tests:
        needs: detect-changes
        runs-on: ubuntu-latest
        permissions:
            checks: write
        strategy:
            fail-fast: false
            matrix:
                service: [auth-service, project-service, task-service, notification-service]
        steps:
            - uses: actions/checkout@v4

            - name: Vérifier si modifié
              id: check
              run: |
                  if [ "${{ matrix.service }}" = "auth-service" ]; then echo "changed=${{ needs.detect-changes.outputs.auth }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "project-service" ]; then echo "changed=${{ needs.detect-changes.outputs.project }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "task-service" ]; then echo "changed=${{ needs.detect-changes.outputs.task }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "notification-service" ]; then echo "changed=${{ needs.detect-changes.outputs.notification }}" >> $GITHUB_OUTPUT; fi

            - uses: actions/setup-node@v6
              if: steps.check.outputs.changed == 'true'
              with:
                  node-version: 20
                  cache: 'npm'

            - run: npm ci
              if: steps.check.outputs.changed == 'true'

            - name: Tests unitaires ${{ matrix.service }}
              if: steps.check.outputs.changed == 'true'
              env:
                  JEST_JUNIT_OUTPUT_FILE: junit-${{ matrix.service }}.xml
              run: npx jest --projects services/${{ matrix.service }} --coverage --reporters=default --reporters=jest-junit

            - name: Publier résultats tests
              uses: dorny/test-reporter@v1
              if: always() && steps.check.outputs.changed == 'true'
              with:
                  name: Tests ${{ matrix.service }}
                  path: junit-${{ matrix.service }}.xml
                  reporter: jest-junit

            - name: Upload couverture de test
              if: steps.check.outputs.changed == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-${{ matrix.service }}
                  path: services/${{ matrix.service }}/coverage/

    # ─── ESLint (par service) ───
    lint:
        needs: detect-changes
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                service: [auth-service, project-service, task-service, notification-service]
        steps:
            - uses: actions/checkout@v4

            - name: Vérifier si modifié
              id: check
              run: |
                  if [ "${{ matrix.service }}" = "auth-service" ]; then echo "changed=${{ needs.detect-changes.outputs.auth }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "project-service" ]; then echo "changed=${{ needs.detect-changes.outputs.project }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "task-service" ]; then echo "changed=${{ needs.detect-changes.outputs.task }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "notification-service" ]; then echo "changed=${{ needs.detect-changes.outputs.notification }}" >> $GITHUB_OUTPUT; fi

            - uses: actions/setup-node@v6
              if: steps.check.outputs.changed == 'true'
              with:
                  node-version: 20
                  cache: 'npm'

            - run: npm ci
              if: steps.check.outputs.changed == 'true'

            - name: ESLint ${{ matrix.service }}
              if: steps.check.outputs.changed == 'true'
              run: npx eslint services/${{ matrix.service }}/src

    # ─── TypeScript check (par service) ───
    typecheck:
        needs: detect-changes
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                service: [auth-service, project-service, task-service, notification-service]
        steps:
            - uses: actions/checkout@v4

            - name: Vérifier si modifié
              id: check
              run: |
                  if [ "${{ matrix.service }}" = "auth-service" ]; then echo "changed=${{ needs.detect-changes.outputs.auth }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "project-service" ]; then echo "changed=${{ needs.detect-changes.outputs.project }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "task-service" ]; then echo "changed=${{ needs.detect-changes.outputs.task }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "notification-service" ]; then echo "changed=${{ needs.detect-changes.outputs.notification }}" >> $GITHUB_OUTPUT; fi

            - uses: actions/setup-node@v6
              if: steps.check.outputs.changed == 'true'
              with:
                  node-version: 20
                  cache: 'npm'

            - run: npm ci
              if: steps.check.outputs.changed == 'true'

            - name: TypeScript check ${{ matrix.service }}
              if: steps.check.outputs.changed == 'true'
              run: npx tsc --noEmit -p services/${{ matrix.service }}/tsconfig.json

    # ─── Build Docker multi-arch (par service) ───
    build:
        needs: detect-changes
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                service: [auth-service, project-service, task-service, notification-service]
        steps:
            - uses: actions/checkout@v4

            - name: Vérifier si modifié
              id: check
              run: |
                  if [ "${{ matrix.service }}" = "auth-service" ]; then echo "changed=${{ needs.detect-changes.outputs.auth }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "project-service" ]; then echo "changed=${{ needs.detect-changes.outputs.project }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "task-service" ]; then echo "changed=${{ needs.detect-changes.outputs.task }}" >> $GITHUB_OUTPUT; fi
                  if [ "${{ matrix.service }}" = "notification-service" ]; then echo "changed=${{ needs.detect-changes.outputs.notification }}" >> $GITHUB_OUTPUT; fi

            - name: Setup QEMU
              if: steps.check.outputs.changed == 'true'
              uses: docker/setup-qemu-action@v3

            - name: Setup Docker Buildx
              if: steps.check.outputs.changed == 'true'
              uses: docker/setup-buildx-action@v3

            - name: Build image ${{ matrix.service }}
              if: steps.check.outputs.changed == 'true'
              uses: docker/build-push-action@v6
              with:
                  context: ./services/${{ matrix.service }}
                  platforms: linux/amd64,linux/arm64
                  push: false
                  tags: ${{ matrix.service }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    # ─── Trivy : scan des images Docker ───
    trivy:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            security-events: write
        strategy:
            fail-fast: false
            matrix:
                service: [auth-service, project-service, task-service, notification-service]
        steps:
            - uses: actions/checkout@v4
            - name: Build image pour scan
              run: docker build -t ${{ matrix.service }}:scan ./services/${{ matrix.service }}
            - name: Trivy scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ matrix.service }}:scan
                  format: 'sarif'
                  output: 'trivy-${{ matrix.service }}.sarif'
                  severity: 'CRITICAL,HIGH'
            - name: Upload résultats Trivy vers GitHub Security
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                  sarif_file: 'trivy-${{ matrix.service }}.sarif'
                  category: 'trivy-${{ matrix.service }}'

    # ─── Checks globaux (tout le projet) ───
    prettier:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prettier --check "**/*.{js,ts}"

    hadolint:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                service: [auth-service, project-service, task-service, notification-service]
        steps:
            - uses: actions/checkout@v4
            - uses: hadolint/hadolint-action@v3.1.0
              with:
                  dockerfile: services/${{ matrix.service }}/Dockerfile

    codeql:
        runs-on: ubuntu-latest
        permissions:
            security-events: write
        steps:
            - uses: actions/checkout@v4
            - uses: github/codeql-action/init@v3
              with:
                  languages: javascript-typescript
            - uses: github/codeql-action/analyze@v3

    sonarcloud:
        needs: tests
        if: github.actor != 'dependabot[bot]'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - name: Télécharger les rapports de couverture
              uses: actions/download-artifact@v4
              with:
                  pattern: coverage-*
                  merge-multiple: true
            - uses: SonarSource/sonarqube-scan-action@v6
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              with:
                  args: >
                      -Dsonar.host.url=https://sonarcloud.io

