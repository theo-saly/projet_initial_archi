services:
    auth-service:
        image: ghcr.io/${REGISTRY_OWNER}/projet_initial_archi/auth-service:latest
        ports:
            - '3001:3001'
        environment:
            - JWT_SECRET=${JWT_SECRET}
            - SQLITE_DB_LOCATION=/app/data/auth.db
        volumes:
            - auth-data:/app/data
        restart: unless-stopped

    project-service:
        image: ghcr.io/${REGISTRY_OWNER}/projet_initial_archi/project-service:latest
        ports:
            - '3002:3002'
        environment:
            - JWT_SECRET=${JWT_SECRET}
            - DB_TYPE=${DB_TYPE:-sqlite}
            - SQLITE_DB_LOCATION=/app/data/projects.db
            - TASK_SERVICE_URL=http://task-service:3003
            - REDIS_HOST=redis
        volumes:
            - project-data:/app/data
        depends_on:
            - redis
        restart: unless-stopped

    project-migrations:
        image: ghcr.io/${REGISTRY_OWNER}/projet_initial_archi/project-service:latest
        command: ['node', 'dist/migrations/cli.js', 'up']
        profiles:
            - production
        environment:
            - DB_TYPE=${DB_TYPE:-sqlite}
            - SQLITE_DB_LOCATION=/app/data/projects.db
        volumes:
            - project-data:/app/data

    task-service:
        image: ghcr.io/${REGISTRY_OWNER}/projet_initial_archi/task-service:latest
        ports:
            - '3003:3003'
        environment:
            - JWT_SECRET=${JWT_SECRET}
            - DB_TYPE=${DB_TYPE:-sqlite}
            - SQLITE_DB_LOCATION=/app/data/tasks.db
            - REDIS_HOST=redis
        volumes:
            - task-data:/app/data
        depends_on:
            - redis
        restart: unless-stopped

    task-migrations:
        image: ghcr.io/${REGISTRY_OWNER}/projet_initial_archi/task-service:latest
        command: ['node', 'dist/migrations/cli.js', 'up']
        profiles:
            - production
        environment:
            - DB_TYPE=${DB_TYPE:-sqlite}
            - SQLITE_DB_LOCATION=/app/data/tasks.db
        volumes:
            - task-data:/app/data

    notification-service:
        image: ghcr.io/${REGISTRY_OWNER}/projet_initial_archi/notification-service:latest
        ports:
            - '3004:3004'
        environment:
            - REDIS_HOST=redis
            - LOG_FILE=/app/logs/notifications.log
            - AUTH_SERVICE_URL=http://auth-service:3001
            - PROJECT_SERVICE_URL=http://project-service:3002
        volumes:
            - notification-logs:/app/logs
        depends_on:
            - redis
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        restart: unless-stopped

volumes:
    auth-data:
    project-data:
    task-data:
    notification-logs:
