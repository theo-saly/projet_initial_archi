name: Publish

on:
    push:
        branches: [main]

jobs:
    # ─── Job 1 : Build des images avec version anticipée ────────────────────
    # On calcule la prochaine version (PATCH+1) SANS encore commiter le bump.
    # L'image est buildée avec cette version future dans son LABEL.
    # Le commit réel n'a lieu qu'en job 3, après validation des tests.
    build-images:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: auth-service
                      port: 3001
                    - service: project-service
                      port: 3002
                    - service: task-service
                      port: 3003
                    - service: notification-service
                      port: 3004
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Setup QEMU
              uses: docker/setup-qemu-action@v3

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Calculer la prochaine version et lire le manifeste
              id: compat
              run: |
                  SERVICE=${{ matrix.service }}
                  COMPAT="services/$SERVICE/compatibility.json"

                  CURRENT=$(node -p "require('./services/$SERVICE/package.json').version")

                  # Vérifier si ce service a des changements réels (hors fichiers de config)
                  CHANGED=$(git diff --name-only HEAD~1 HEAD -- "services/$SERVICE/" \
                    | grep -v "package.json" | grep -v "compatibility.json" || true)

                  if [ -n "$CHANGED" ]; then
                    # Calculer PATCH+1 sans modifier package.json
                    IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
                    NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
                  else
                    NEXT="$CURRENT"
                  fi

                  echo "version=$NEXT" >> "$GITHUB_OUTPUT"
                  echo "major=$(echo "$NEXT" | cut -d. -f1)" >> "$GITHUB_OUTPUT"
                  echo "minor=$(echo "$NEXT" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"

                  echo "provides_api=$(node -p "require('./$COMPAT').provides['api-version'] || 'v1'")" \
                    >> "$GITHUB_OUTPUT"
                  echo "req_auth=$(node -p "require('./$COMPAT').requires['auth-service'] || ''")" \
                    >> "$GITHUB_OUTPUT"
                  echo "req_project=$(node -p "require('./$COMPAT').requires['project-service'] || ''")" \
                    >> "$GITHUB_OUTPUT"
                  echo "req_task=$(node -p "require('./$COMPAT').requires['task-service'] || ''")" \
                    >> "$GITHUB_OUTPUT"
                  echo "req_notification=$(node -p "require('./$COMPAT').requires['notification-service'] || ''")" \
                    >> "$GITHUB_OUTPUT"

            - name: Build et push ${{ matrix.service }} (:sha et :vX.Y.Z)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: services/Dockerfile
                  build-args: |
                      SERVICE=${{ matrix.service }}
                      PORT=${{ matrix.port }}
                      VERSION=${{ steps.compat.outputs.version }}
                      PROVIDES_API_VERSION=${{ steps.compat.outputs.provides_api }}
                      REQUIRES_AUTH_SERVICE=${{ steps.compat.outputs.req_auth }}
                      REQUIRES_PROJECT_SERVICE=${{ steps.compat.outputs.req_project }}
                      REQUIRES_TASK_SERVICE=${{ steps.compat.outputs.req_task }}
                      REQUIRES_NOTIFICATION_SERVICE=${{ steps.compat.outputs.req_notification }}
                  platforms: linux/amd64,linux/arm64
                  push: true
                  # :latest absent volontairement — ajouté en job 3 seulement si tests OK
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/projet_initial_archi/${{ matrix.service }}:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/projet_initial_archi/${{ matrix.service }}:${{ steps.compat.outputs.version }}
                      ghcr.io/${{ github.repository_owner }}/projet_initial_archi/${{ matrix.service }}:${{ steps.compat.outputs.major }}
                      ghcr.io/${{ github.repository_owner }}/projet_initial_archi/${{ matrix.service }}:${{ steps.compat.outputs.minor }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    # ─── Job 2 : Tests d'intégration sur la combinaison complète ────────────
    # Tous les services démarrent avec les images sha fraîchement buildées.
    # Si un seul service est incompatible → job rouge → pas de bump, pas de :latest.
    integration-tests:
        needs: build-images
        runs-on: ubuntu-latest
        permissions:
            packages: read
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - run: npm ci

            - name: Login GHCR pour puller les images
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Démarrer la stack complète avec les images du sha courant
              env:
                  IMAGE_TAG: ${{ github.sha }}
                  REGISTRY_OWNER: ${{ github.repository_owner }}
                  JWT_SECRET: ci-integration-secret
              run: docker compose -f docker-compose.ci.yml up -d

            - name: Attendre que tous les services soient joignables
              run: |
                  for i in $(seq 1 40); do
                    ALL_OK=true
                    for PORT in 3001 3002 3003; do
                      if ! curl -sf "http://localhost:$PORT/" > /dev/null 2>&1; then
                        ALL_OK=false
                      fi
                    done
                    if [ "$ALL_OK" = "true" ]; then
                      echo "Services prêts"
                      break
                    fi
                    sleep 3
                  done

            - name: Vérifier la compatibilité entre services
              run: npx ts-node scripts/check-compatibility.ts

            - name: Lancer les tests d'intégration
              run: npm run test:integration

            - name: Logs des services en cas d'échec
              if: failure()
              env:
                  IMAGE_TAG: ${{ github.sha }}
                  REGISTRY_OWNER: ${{ github.repository_owner }}
              run: docker compose -f docker-compose.ci.yml logs

            - name: Arrêter la stack
              if: always()
              env:
                  IMAGE_TAG: ${{ github.sha }}
                  REGISTRY_OWNER: ${{ github.repository_owner }}
              run: docker compose -f docker-compose.ci.yml down -v

    # ─── Job 3 : Bump versions + push :latest (seulement si tests OK) ───────
    # Ce job ne s'exécute QUE si les tests d'intégration ont réussi.
    # C'est ici que la version est réellement commitée dans package.json,
    # et que :latest est publié sur le registre.
    finalize:
        needs: [build-images, integration-tests]
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 2
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Configurer Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Bumper les versions des services modifiés
              id: bump
              run: |
                  SERVICES=("auth-service" "project-service" "task-service" "notification-service" "api-gateway")
                  HAS_CHANGES=false

                  for service in "${SERVICES[@]}"; do
                    CHANGED=$(git diff --name-only HEAD~1 HEAD -- "services/$service/" \
                      | grep -v "package.json" | grep -v "compatibility.json" || true)

                    if [ -n "$CHANGED" ]; then
                      echo "→ Bump $service"
                      npm version patch --no-git-tag-version \
                        --workspace "services/$service"
                      HAS_CHANGES=true
                    fi
                  done

                  echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

            - name: Commiter le bump de version
              if: steps.bump.outputs.has_changes == 'true'
              run: |
                  git add services/*/package.json
                  git commit -m "chore: bump service versions [skip ci]"
                  git push

            - name: Promouvoir les images :sha vers :latest
              # Les images sha sont validées par les tests → on peut les publier.
              # imagetools create recrée le tag sans re-télécharger l'image.
              run: |
                  REGISTRY="ghcr.io/${{ github.repository_owner }}/projet_initial_archi"
                  for service in auth-service project-service task-service notification-service; do
                    docker buildx imagetools create \
                      --tag "$REGISTRY/$service:latest" \
                      "$REGISTRY/$service:${{ github.sha }}"
                    echo "$service → :latest publié"
                  done

    # ─── Job 4 : Déploiement en production ───────────────────────────────────
    # Requiert les secrets dans Settings → Environments → production :
    #   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH
    deploy-prod:
        needs: finalize
        runs-on: ubuntu-latest
        environment: production
        steps:
            - name: Déployer en production via SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.DEPLOY_HOST }}
                  username: ${{ secrets.DEPLOY_USER }}
                  key: ${{ secrets.DEPLOY_SSH_KEY }}
                  script: |
                      set -e
                      cd ${{ secrets.DEPLOY_PATH }}

                      REGISTRY="ghcr.io/${{ github.repository_owner }}/projet_initial_archi"
                      SERVICES=("auth-service" "project-service" "task-service" "notification-service")

                      echo "=== 1. Sauvegarde des images actuelles (rollback point) ==="
                      declare -A PREV_IMAGES
                      for service in "${SERVICES[@]}"; do
                        PREV=$(docker inspect --format='{{.Image}}' "$service" 2>/dev/null || echo "")
                        PREV_IMAGES[$service]="$PREV"
                        echo "$service → ${PREV:-aucune image précédente}"
                      done

                      echo "=== 2. Migrations de base de données ==="
                      docker compose --profile production up \
                        project-migrations task-migrations \
                        --no-deps --wait

                      echo "=== 3. Redémarrage progressif des services ==="
                      ROLLBACK_NEEDED=false

                      for service in "${SERVICES[@]}"; do
                        echo "--- Déploiement de $service ---"
                        docker pull "$REGISTRY/$service:latest"
                        docker compose up -d --no-deps --pull never "$service"

                        HEALTHY=false
                        for i in $(seq 1 20); do
                          STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$service" 2>/dev/null || echo "none")
                          if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "none" ]; then
                            HEALTHY=true
                            break
                          fi
                          sleep 3
                        done

                        if [ "$HEALTHY" = "false" ]; then
                          echo "ÉCHEC : $service unhealthy → rollback"
                          ROLLBACK_NEEDED=true
                          PREV="${PREV_IMAGES[$service]}"
                          if [ -n "$PREV" ]; then
                            docker tag "$PREV" "$REGISTRY/$service:rollback"
                            docker compose up -d --no-deps "$service"
                          fi
                          break
                        fi

                        echo "$service OK"
                      done

                      if [ "$ROLLBACK_NEEDED" = "true" ]; then
                        echo "=== ROLLBACK effectué ==="
                        exit 1
                      fi

                      echo "=== Déploiement terminé avec succès ==="
