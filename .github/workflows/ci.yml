name: CI

on:
    pull_request:
        branches: [dev, main]

jobs:
    # ─── Détecter quels services ont changé ───
    detect-changes:
        runs-on: ubuntu-latest
        outputs:
            auth: ${{ steps.filter.outputs.auth }}
            project: ${{ steps.filter.outputs.project }}
            task: ${{ steps.filter.outputs.task }}
            notification: ${{ steps.filter.outputs.notification }}
            frontend: ${{ steps.filter.outputs.frontend }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      auth:
                        - 'services/auth-service/**'
                      project:
                        - 'services/project-service/**'
                      task:
                        - 'services/task-service/**'
                      notification:
                        - 'services/notification-service/**'
                      frontend:
                        - 'frontend/**'

    # ─── Tests unitaires (par service modifié) ───
    tests:
        needs: detect-changes
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: auth-service
                      changed: ${{ needs.detect-changes.outputs.auth }}
                    - service: project-service
                      changed: ${{ needs.detect-changes.outputs.project }}
                    - service: task-service
                      changed: ${{ needs.detect-changes.outputs.task }}
                    - service: notification-service
                      changed: ${{ needs.detect-changes.outputs.notification }}
        steps:
            - uses: actions/checkout@v4
              if: matrix.changed == 'true'

            - uses: actions/setup-node@v4
              if: matrix.changed == 'true'
              with:
                  node-version: 20
                  cache: 'npm'

            - run: npm ci
              if: matrix.changed == 'true'

            - name: Tests unitaires ${{ matrix.service }}
              if: matrix.changed == 'true'
              run: npx jest --projects services/${{ matrix.service }} --coverage

            - name: Upload couverture de test
              if: matrix.changed == 'true'
              uses: actions/upload-artifact@v4
              with:
                name: coverage-${{ matrix.service }}
                path: services/${{ matrix.service }}/coverage/

    # ─── ESLint (par service modifié) ───
    lint:
        needs: detect-changes
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: auth-service
                      changed: ${{ needs.detect-changes.outputs.auth }}
                    - service: project-service
                      changed: ${{ needs.detect-changes.outputs.project }}
                    - service: task-service
                      changed: ${{ needs.detect-changes.outputs.task }}
                    - service: notification-service
                      changed: ${{ needs.detect-changes.outputs.notification }}
        steps:
            - uses: actions/checkout@v4
              if: matrix.changed == 'true'

            - uses: actions/setup-node@v4
              if: matrix.changed == 'true'
              with:
                  node-version: 20
                  cache: 'npm'

            - run: npm ci
              if: matrix.changed == 'true'

            - name: ESLint ${{ matrix.service }}
              if: matrix.changed == 'true'
              run: npx eslint services/${{ matrix.service }}/src

    # ─── TypeScript check (par service modifié) ───
    typecheck:
        needs: detect-changes
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: auth-service
                      changed: ${{ needs.detect-changes.outputs.auth }}
                    - service: project-service
                      changed: ${{ needs.detect-changes.outputs.project }}
                    - service: task-service
                      changed: ${{ needs.detect-changes.outputs.task }}
                    - service: notification-service
                      changed: ${{ needs.detect-changes.outputs.notification }}
        steps:
            - uses: actions/checkout@v4
              if: matrix.changed == 'true'

            - uses: actions/setup-node@v4
              if: matrix.changed == 'true'
              with:
                  node-version: 20
                  cache: 'npm'

            - run: npm ci
              if: matrix.changed == 'true'

            - name: TypeScript check ${{ matrix.service }}
              if: matrix.changed == 'true'
              run: npx tsc --noEmit -p services/${{ matrix.service }}/tsconfig.json

    # ─── Build Docker multi-arch (par service modifié) ───
    build:
        needs: detect-changes
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: auth-service
                      changed: ${{ needs.detect-changes.outputs.auth }}
                    - service: project-service
                      changed: ${{ needs.detect-changes.outputs.project }}
                    - service: task-service
                      changed: ${{ needs.detect-changes.outputs.task }}
                    - service: notification-service
                      changed: ${{ needs.detect-changes.outputs.notification }}
        steps:
            - uses: actions/checkout@v4
              if: matrix.changed == 'true'

            - name: Setup QEMU
              if: matrix.changed == 'true'
              uses: docker/setup-qemu-action@v3

            - name: Setup Docker Buildx
              if: matrix.changed == 'true'
              uses: docker/setup-buildx-action@v3

            - name: Build image ${{ matrix.service }}
              if: matrix.changed == 'true'
              uses: docker/build-push-action@v6
              with:
                  context: ./services/${{ matrix.service }}
                  platforms: linux/amd64,linux/arm64
                  push: false
                  tags: ${{ matrix.service }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    # ─── Trivy : scan des images Docker ───
    trivy:
        needs: build
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: auth-service
                    - service: project-service
                    - service: task-service
                    - service: notification-service
        steps:
            - uses: actions/checkout@v4
            - name: Build image pour scan
              run: docker build -t ${{ matrix.service }}:scan ./services/${{ matrix.service }}
            - name: Trivy scan
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ matrix.service }}:scan
                  format: 'table'
                  severity: 'CRITICAL,HIGH'

    # ─── Checks globaux (tout le projet) ───
    prettier:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prettier --check "**/*.{js,ts}"

    hadolint:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - service: auth-service
                    - service: project-service
                    - service: task-service
                    - service: notification-service
        steps:
            - uses: actions/checkout@v4
            - uses: hadolint/hadolint-action@v3.1.0
              with:
                  dockerfile: services/${{ matrix.service }}/Dockerfile

    codeql:
        runs-on: ubuntu-latest
        permissions:
            security-events: write
        steps:
            - uses: actions/checkout@v4
            - uses: github/codeql-action/init@v3
              with:
                  languages: javascript-typescript
            - uses: github/codeql-action/analyze@v3

    sonarcloud:
        needs: tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - name: Télécharger les rapports de couverture
              uses: actions/download-artifact@v4
              with:
                  pattern: coverage-*
                  merge-multiple: true
            - uses: SonarSource/sonarqube-scan-action@v5
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              with:
                  args: >
                      -Dsonar.host.url=https://sonarcloud.io

    compose-config:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - run: docker compose config --quiet

    gitleaks:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
