name: CI-test-E2E

on:
    schedule:
        - cron: '0 2 * * *'
    workflow_dispatch:

jobs:
    check-activity:
        runs-on: ubuntu-latest
        outputs:
            has-changes: ${{ steps.check.outputs.has-changes }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Vérifier si des commits dans les dernières 24h
              id: check
              run: |
                  COMMITS=$(git log --oneline --since="24 hours ago" | wc -l)
                  if [ "$COMMITS" -gt 0 ]; then
                    echo "has-changes=true" >> $GITHUB_OUTPUT
                  else
                    echo "has-changes=false" >> $GITHUB_OUTPUT
                  fi

    e2e-tests:
        needs: check-activity
        if: needs.check-activity.outputs.has-changes == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Lancer l'infrastructure
              run: docker compose up -d --build

            - name: Attendre que les services soient prêts
              run: |
                  echo "Attente des services..."
                  sleep 30
                  curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:3000 || true

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - run: npm ci

            - name: Installer les navigateurs Playwright
              run: npx playwright install --with-deps chromium

            - name: Tests E2E
              run: npx playwright test

            - name: Upload rapport Playwright
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: test-results/

            - name: Arrêter l'infrastructure
              if: always()
              run: docker compose down
