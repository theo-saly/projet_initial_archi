server {
    listen 80;
    server_name _;

    # Docker embedded DNS to resolve service names at runtime.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward project API calls to the project service container.
    location /api/projects {
        set $project_upstream http://project-service:3002;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass $project_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forward task API calls to the task service container.
    location /api/tasks {
        set $task_upstream http://task-service:3003;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass $task_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forward auth API calls to the auth service container.
    location = /api/auth {
        return 301 /api/auth/;
    }

    location ^~ /api/auth/ {
        set $auth_upstream http://auth-service:3001;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass $auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
